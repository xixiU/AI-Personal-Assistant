version: '3.8'

services:
  ai-assistant-gpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-assistant:gpu
    container_name: ai-assistant-gpu
    restart: unless-stopped

    # GPU 支持
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]

    ports:
      - "11111:11111"

    volumes:
      - ../config.yaml:/app/config.yaml:ro
      - ../logs:/app/logs
      - ../data:/app/data
      - ../models:/app/models:ro

    environment:
      - CUDA_VISIBLE_DEVICES=0
      - PYTHONUNBUFFERED=1

  ai-assistant-cpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    image: ai-assistant:cpu
    container_name: ai-assistant-cpu
    restart: unless-stopped

    ports:
      - "11111:11111"

    volumes:
      - ../config.yaml:/app/config.yaml:ro
      - ../logs:/app/logs
      - ../data:/app/data
      - ../models:/app/models:ro

    environment:
      - PYTHONUNBUFFERED=1
