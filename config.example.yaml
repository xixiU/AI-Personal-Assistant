# 触发规则
trigger:
  keyword: "【ai】"
  check_mention: true
  check_private: true

# 上下文策略
context:
  mode: "short"
  max_messages: 10
  session_timeout: 3600

# AI配置
ai:
  primary:
    provider: "openai"  # AI 提供商: "openai" (OpenAI 兼容接口) 或 "cherrystudio"
    base_url: "http://localhost:23333"
    api_key: ""
    model: "gpt-4-vision-preview"

  timeout: 30
  multimodal: false

# 回复执行
reply:
  mode: "clipboard"
  notification: true

# 系统配置
system:
  poll_interval: 5.0  # UI 轮询间隔（秒），避免轮询太快影响用户操作

# IM适配器
adapters:
  - name: "feishu"
    enabled: true
    priority: 1
    mode: "ui_automation"  # 模式: "bot_api" 或 "ui_automation"

    # UI 自动化模式配置（无需审批，本地运行）
    ui_automation:
      window_titles: ["飞书", "Lark", "Feishu"]
      poll_interval: 1.0  # 轮询间隔（秒）

    # 机器人 API 模式配置（需要创建飞书应用）
    bot_api:
      app_id: ""           # 飞书应用 App ID
      app_secret: ""       # 飞书应用 App Secret
      verification_token: ""  # 事件订阅验证 Token
      encrypt_key: ""      # 事件加密 Key（可选）
      webhook_url: "http://your-server.com/webhook/feishu"  # Webhook 回调地址
      allowed_chats: []    # 允许的群聊 ID 白名单（为空则允许所有）
      allowed_users: []    # 允许的用户 ID 白名单（为空则允许所有）

  - name: "wechat"
    enabled: false
    priority: 2

    # 微信适配器配置（基于 pywechat）
    wechat_version: "3.9"  # 微信版本: "3.9" 或 "4.1"
                           # 3.9: 使用 pywechat127 (pip install pywechat127==1.9.7)
                           # 4.1: 使用 pyweixin (pip install git+https://github.com/Hello-Mr-Crab/pywechat.git)
    poll_interval: 1.0     # 轮询间隔（秒）
    monitored_chats: []    # 监控的聊天列表（好友名或群名）
                           # 示例: ["张三", "工作群", "项目讨论组"]
                           # 留空则监听所有聊天（4.1 版本需手动复制消息）

# 日志
logging:
  level: "INFO"
  file: "logs/ai-assistant.log"
  rotation: "daily"
  retention: 7
