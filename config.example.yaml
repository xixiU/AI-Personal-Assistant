# 触发规则
trigger:
  keyword: "ai"
  check_mention: true
  check_private: true
  ignore_mention_all: true  # 忽略 @所有人 的消息（默认不回复）

# 上下文策略
context:
  mode: "short"
  max_messages: 10
  session_timeout: 3600

# AI配置
ai:
  primary:
    provider: "openai"  # AI 提供商: "openai" (OpenAI 兼容接口), "dify" (Dify 平台), "anthropic" (Anthropic Claude)
    base_url: "http://localhost:11434"  # 示例：Ollama 本地服务
    api_key: ""  # 本地服务留空，云服务填写 API Key
    model: "llama2"  # 示例：Ollama 模型名称

  # Anthropic 配置示例（当 provider 为 "anthropic" 时使用）
  # primary:
  #   provider: "anthropic"
  #   base_url: ""  # 可选，留空使用官方 API；填写则使用代理或兼容服务
  #   api_key: "sk-ant-xxx"  # Anthropic API Key
  #   model: "claude-sonnet-4-20250514"

  # Dify 特定配置（当 provider 为 "dify" 时使用）
  dify:
    app_type: "chat"  # 应用类型: "chat" (对话型) 或 "completion" (完成型)
    user: "default-user"  # 用户标识，用于区分不同用户

  timeout: 90  # 超时时间（秒），文档获取可能较慢，建议设置较大值
  multimodal: false

# 回复执行
reply:
  mode: "clipboard"
  notification: true

# 系统配置
system:
  poll_interval: 10.0  # UI 轮询间隔（秒），避免轮询太快影响用户操作
  webhook_port: 8080   # Webhook 服务器端口（飞书机器人模式使用）
  disable_proxy: true  # 禁用系统代理（避免代理干扰内网/私有化部署访问）
  event_queue_size: 100  # 事件队列最大长度（队列满时新事件将被丢弃）
  max_concurrent_workers: 5  # 最大并发处理数（同时处理多少个用户请求）

# IM适配器
adapters:
  - name: "feishu"
    enabled: true
    priority: 1

    # 飞书机器人 API 配置（需在飞书开放平台创建应用）
    bot_api:
      base_url: "https://open.feishu.cn"  # 飞书开放平台地址（私有化部署时修改）
      app_id: ""           # 飞书应用 App ID
      app_secret: ""       # 飞书应用 App Secret
      verification_token: ""  # 事件订阅验证 Token
      encrypt_key: ""      # 事件加密 Key（可选）
      allowed_chats: []    # 允许的群聊 ID 白名单（为空则允许所有）
      allowed_users: []    # 允许的用户 ID 白名单（为空则允许所有）
      welcome_message: "👋 大家好！我是 AI 助手，很高兴加入这个群聊。\n\n我可以帮助大家回答问题、查询文档等。直接 @ 我或私法发送消息即可。\n\n📖 使用文档：https://example.com/docs/ai-assistant"  # 机器人入群欢迎消息（支持 HTTP 链接） 直接回复群聊消息不艾特需要开启【获取群组中所有消息】事件
      thinking_reaction: true  # 收到消息后添加"思考中"🤔表情回复（体验优化，默认开启）
      thinking_emoji: "THINKING"  # 思考表情类型（默认 🤔），可选：THINKING/OK_HAND👌/THUMBSUP👍/EYES👀/FIRE🔥，更多https://open.feishu.cn/document/server-docs/im-v1/message-reaction/emojis-introduce?lang=zh-CN

  - name: "wechat"
    enabled: false
    priority: 2

    # 微信适配器配置（基于 pywechat）
    wechat_version: "3.9"  # 微信版本: "3.9" 或 "4.1"
                           # 3.9: 使用 pywechat127 (pip install pywechat127==1.9.7)
                           # 4.1: 使用 pyweixin (pip install git+https://github.com/Hello-Mr-Crab/pywechat.git)
    poll_interval: 1.0     # 轮询间隔（秒）
    monitored_chats: []    # 监控的聊天列表（好友名或群名）
                           # 示例: ["张三", "工作群", "项目讨论组"]
                           # 留空则监听所有聊天（4.1 版本需手动复制消息）

# 飞书文档配置
feishu_docs:
  enabled: false  # 默认关闭
  mcp_url: "http://localhost:50070/sse"  # MCP 服务器地址
  doc_base_url: "https://xxx.feishu.cn"  # 飞书文档域名（用于生成文档链接）
  cache_dir: "./data/feishu_docs"        # 本地缓存目录
  cache_ttl: 86400                       # 缓存有效期（秒），1天=86400
  alert_webhook: ""                      # 飞书告警 Webhook URL（可选），MCP 调用失败时发送告警
  sources:                               # 文档源配置（必须明确 type，避免 MCP auto 模式重试）
    # 知识库示例（type: wiki）
    # - token: "C5RNwyHtWikA4LkBN9trd4u8zFd"
    #   type: "wiki"
    # 云空间示例（type: drive）
    # - token: "HRfkf7lPDlQbqqdswOsrKPsezAd"
    #   type: "drive"
    # 兼容旧格式：纯字符串默认按 wiki 处理
    # - "C5RNwyHtWikA4LkBN9trd4u8zFd"

# 向量数据库配置（用于文档检索）
vector_db:
  use_gpu: false  # 是否使用 GPU 加速 Embedding 生成（需要安装 onnxruntime-gpu）
  gpu_id: 0       # GPU 配置（支持单卡和多卡）
                  # 单卡: gpu_id: 0 或 gpu_id: 1
                  # 多卡: gpu_id: "0,1" 或 gpu_id: [0, 1]
                  # 注意：容器内 GPU 编号从 0 开始，与 docker-compose.yml 的 device_ids 无关
                  #      例如 device_ids: ['1'] 时，容器内只有 GPU 0（对应宿主机 GPU 1）
                  # 多卡模式：不同 batch 轮询分配到不同 GPU，提升大量文档索引速度
  batch_size: 32  # Embedding 批处理大小，影响显存占用和处理速度
                  # 显存占用估算（text2vec-base-chinese）：
                  #   batch_size=32:  约 1-1.5GB
                  #   batch_size=64:  约 2-3GB
                  #   batch_size=128: 约 4-6GB
                  #   batch_size=256: 约 8-12GB
                  # 建议：GPU 显存 ≥ 16GB 时用 128-256，否则用 32-64
                  #      CPU 模式建议 16-32

# 本地离线文档配置
# 用于补充不在飞书知识库中的文档（如 SQL 配置、产品手册等）
# 文档会自动纳入混合检索引擎，根据用户问题语义匹配相关内容
local_docs:
  # - path: "./data/local_docs/sql"       # 文档目录路径
  #   description: "数据库SQL配置"         # 描述（会作为文档标题前缀）
  # - path: "./data/local_docs/manual"
  #   description: "产品使用手册"

# 日志
logging:
  level: "INFO"
  file: "logs/ai-assistant.log"
  rotation: "daily"
  retention: 7

# 对话历史
chat_history:
  enabled: true                       # 是否开启对话历史保存（默认开启）
  dir: "./data/chat_history"          # 保存目录（按天分文件，JSONL 格式）

# 代码排查配置（需要 Anthropic Provider）
troubleshoot:
  enabled: false                      # 是否启用代码排查功能
  repo_path: "./data/business_repo"   # 业务系统代码仓库路径，强烈建议统一放置在data目录下，docker-compose统一处理文件映射（需提前 git clone）
  default_ref: "origin/main"          # 默认分支（用户未指定版本时使用）
  max_rounds: 6                       # Agentic 最大工具调用轮数
  tool_timeout: 30                    # 单个工具超时时间（秒）
  branch_hint: |                      # 版本号→分支映射提示（注入给 AI，可选）
    版本号对应分支命名规则：
    - 大部分场景：dev-<版本号>，如版本 4.3.5 对应分支 dev-4.3.5
    - 特殊定制版本：可能使用 custom-<客户名>-<版本号> 格式
    - 优先级：dev- > release- > hotfix- > 其他
    - 若找到多个匹配分支，请列出让用户选择
  # 使用说明：
  # 1. 将业务系统代码 clone 到 repo_path 指定的目录
  # 2. 用户发送日志截图 + 版本号，AI 会自动调用 git 工具排查代码
  # 3. 支持的工具：list_refs（列出分支/tag）、search_code（搜索代码）、
  #    read_file（读取文件）、list_dir（列出目录）
  # 4. 所有操作都是只读的，不会修改工作目录，支持并发查询不同分支


