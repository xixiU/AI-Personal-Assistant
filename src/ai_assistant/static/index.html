<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧法庭AI助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f7f9fc;
        }

        .message {
            margin-bottom: 16px;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .message.system .message-content {
            background: #fff3cd;
            color: #856404;
            max-width: 100%;
            text-align: center;
            font-size: 14px;
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .chat-input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .upload-button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #e0e0e0;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.3s, background 0.3s;
            flex-shrink: 0;
        }

        .upload-button:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .upload-button svg {
            width: 20px;
            height: 20px;
            fill: #666;
        }

        .upload-button:hover svg {
            fill: #667eea;
        }

        .send-button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .image-preview {
            display: none;
            padding: 8px 20px 0;
            background: white;
        }

        .image-preview.active {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .image-preview img {
            max-height: 80px;
            max-width: 120px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .image-preview .remove-image {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            background: #dc3545;
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-width: 70px;
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
            }

            30% {
                transform: translateY(-10px);
            }
        }

        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .message-content pre {
            background: #f4f4f4;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-content code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .message-content pre code {
            background: none;
            padding: 0;
        }

        .message-content img {
            max-width: 200px;
            border-radius: 8px;
            margin: 4px 0;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">智慧法庭AI助手</div>
        <div class="chat-messages" id="chatMessages">
            <div class="message system">
                <div class="message-content">
                    欢迎使用 智慧法庭AI助手！支持文字和图片输入。
                </div>
            </div>
        </div>
        <div class="image-preview" id="imagePreview">
            <img id="previewImg" src="" alt="预览">
            <button class="remove-image" id="removeImage">&times;</button>
        </div>
        <div class="chat-input-container">
            <div class="error-message" id="errorMessage"></div>
            <div class="chat-input-wrapper">
                <button class="upload-button" id="uploadButton" title="上传图片">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" />
                    </svg>
                </button>
                <input type="file" id="imageInput" accept="image/*" hidden>
                <input type="text" class="chat-input" id="chatInput" placeholder="输入您的问题..." autocomplete="off">
                <button class="send-button" id="sendButton">发送</button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');
        const errorMessage = document.getElementById('errorMessage');
        const uploadButton = document.getElementById('uploadButton');
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const removeImage = document.getElementById('removeImage');

        let sessionId = 'web-' + Date.now();
        let pendingImage = null; // base64 图片数据

        // 图片上传
        uploadButton.addEventListener('click', () => imageInput.click());

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                showError('请选择图片文件');
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                showError('图片大小不能超过 10MB');
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                pendingImage = {
                    data: event.target.result.split(',')[1], // base64 数据
                    media_type: file.type,
                    name: file.name
                };
                previewImg.src = event.target.result;
                imagePreview.classList.add('active');
            };
            reader.readAsDataURL(file);
            imageInput.value = '';
        });

        removeImage.addEventListener('click', () => {
            pendingImage = null;
            imagePreview.classList.remove('active');
            previewImg.src = '';
        });

        // 添加消息到聊天窗口
        function addMessage(role, content, imageUrl) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            let html = '';
            if (imageUrl) {
                html += `<img src="${imageUrl}" alt="图片"><br>`;
            }

            // Markdown 渲染
            content = content.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
            content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
            content = content.replace(/\n/g, '<br>');
            html += content;

            contentDiv.innerHTML = html;
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'message assistant';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = '<div class="typing-indicator active"><span></span><span></span><span></span></div>';
            chatMessages.appendChild(indicator);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hideTypingIndicator() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.add('active');
            setTimeout(() => errorMessage.classList.remove('active'), 5000);
        }

        // 发送消息
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message && !pendingImage) return;

            chatInput.disabled = true;
            sendButton.disabled = true;

            // 显示用户消息
            const imageUrl = pendingImage ? `data:${pendingImage.media_type};base64,${pendingImage.data}` : null;
            addMessage('user', message || '[图片]', imageUrl);
            chatInput.value = '';

            // 构建请求体
            const requestBody = {
                message: message || '请描述这张图片',
                session_id: sessionId
            };

            if (pendingImage) {
                requestBody.image = {
                    data: pendingImage.data,
                    media_type: pendingImage.media_type
                };
            }

            // 清除图片预览
            pendingImage = null;
            imagePreview.classList.remove('active');
            previewImg.src = '';

            showTypingIndicator();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                hideTypingIndicator();

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || '请求失败');
                }

                const data = await response.json();
                addMessage('assistant', data.reply);
                sessionId = data.session_id;

            } catch (error) {
                hideTypingIndicator();
                showError('发送失败: ' + error.message);
            } finally {
                chatInput.disabled = false;
                sendButton.disabled = false;
                chatInput.focus();
            }
        }

        // 拖拽上传
        const container = document.querySelector('.chat-container');
        container.addEventListener('dragover', (e) => {
            e.preventDefault();
            container.style.outline = '3px dashed #667eea';
        });
        container.addEventListener('dragleave', () => {
            container.style.outline = '';
        });
        container.addEventListener('drop', (e) => {
            e.preventDefault();
            container.style.outline = '';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    pendingImage = {
                        data: event.target.result.split(',')[1],
                        media_type: file.type,
                        name: file.name
                    };
                    previewImg.src = event.target.result;
                    imagePreview.classList.add('active');
                };
                reader.readAsDataURL(file);
            }
        });

        // 粘贴上传
        document.addEventListener('paste', (e) => {
            const items = e.clipboardData.items;
            for (let item of items) {
                if (item.type.startsWith('image/')) {
                    e.preventDefault();
                    const file = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        pendingImage = {
                            data: event.target.result.split(',')[1],
                            media_type: file.type,
                            name: 'clipboard.png'
                        };
                        previewImg.src = event.target.result;
                        imagePreview.classList.add('active');
                    };
                    reader.readAsDataURL(file);
                    break;
                }
            }
        });

        sendButton.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        chatInput.focus();
    </script>
</body>

</html>
